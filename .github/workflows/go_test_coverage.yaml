name: Go Test Coverage

on:
  pull_request:
    branches: [disabled]

env:
  GOPRIVATE: github.com/Fundamentarium
  AWS_REGION: disabled
  DB_HOSTNAME: localhost
  DB_PORT: 5432
  DB_DATABASE: postgres
  DB_USERNAME: postgres
  DB_PASSWORD: password

jobs:
  go-test-coverage:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Check if test files exist
        uses: andstor/file-existence-action@v3
        with:
          files: "**/*_test.go"
          fail: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GOLANG_VERSION }}
          cache: true

      - name: Generate a token for accessing private repositories
        id: private-repos-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_READ_ALL_REPOS_ID }}
          private-key: ${{ secrets.APP_READ_ALL_REPOS_PK }}
          owner: ${{ github.repository_owner }}

      - name: Grant access to private Go Modules
        run: git config --global url."https://fundamentarium:${{ steps.private-repos-token.outputs.token }}@github.com/Fundamentarium".insteadOf "https://github.com/Fundamentarium"

      - name: Get dependencies
        working-directory: ${{ vars.PATH_TO_GO_MOD }}
        run: go mod download

      # The token for private modules is stored in ~/.gitconfig by the "Grant access" step.
      # We revoke it and remove .git before running third-party actions to prevent them
      # from accessing private repositories. The token is short-lived (1h) and the runner
      # is destroyed after the job, but this limits exposure during the job itself.
      - name: Revoke access to private Go Modules
        run: git config --global --unset url."https://fundamentarium:${{ steps.private-repos-token.outputs.token }}@github.com/Fundamentarium".insteadOf

      - name: Build application
        if: ${{ !startsWith(github.event.repository.name, 'lib-go-') }}
        working-directory: ${{ vars.PATH_TO_GO_MOD }}
        run: go build -ldflags="-s -w" -o ./app/ ./...

      - name: Checkout SQL script for database migration
        if: ${{ vars.DB_REPOSITORY_NAME != '' }}
        uses: actions/checkout@v4
        with:
          repository: Fundamentarium/${{ vars.DB_REPOSITORY_NAME }}
          token: ${{ steps.private-repos-token.outputs.token }}
          path: .sql-migration-repo
          sparse-checkout: sql

      - name: Perform database migration
        if: ${{ vars.DB_REPOSITORY_NAME != '' }}
        run: >
          docker run --rm
          -v ${{ github.workspace }}/.sql-migration-repo/sql:/flyway/sql
          --network=host
          flyway/flyway
          -url=jdbc:postgresql://localhost:5432/postgres?sslmode=disable
          -user=postgres
          -password=password
          migrate

      - name: Run tests
        working-directory: ${{ vars.PATH_TO_GO_MOD }}
        run: go test -parallel=1 -p=1 -v -covermode=set -coverprofile=coverage.out ./...

      - name: Remove .git directory
        run: rm -r .git

      - name: Copy coverage files if PATH_TO_GO_MOD != ''
        if: ${{ vars.PATH_TO_GO_MOD != '' }}
        run: cp ${{ vars.PATH_TO_GO_MOD }}/coverage.out .

      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1
        with:
          infile: coverage.out
          outfile: coverage.lcov

      - name: Check test coverage
        uses: terencetcf/github-actions-lcov-minimum-coverage-checker@v1
        with:
          coverage-file: coverage.lcov
          minimum-coverage: ${{ vars.GOLANG_MINIMUM_COVERAGE }}
