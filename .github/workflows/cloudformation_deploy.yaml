name: CloudFormation Deploy

on:
  workflow_call:

jobs:
  cloudformation-deploy:
    name: Deploy to AWS CloudFormation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (production)
        if: startsWith(github.event.repository.name, 'infra-prd-')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::047955125748:role/github-actions-cloudformation-deploy
          aws-region: us-east-1

      - name: Configure AWS Credentials (development)
        if: startsWith(github.event.repository.name, 'infra-dev-')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::047955125748:role/github-actions-cloudformation-deploy
          aws-region: us-east-2

      - name: Verify environment prefix
        if: ${{ !startsWith(github.event.repository.name, 'infra-prd-') && !startsWith(github.event.repository.name, 'infra-dev-') }}
        run: |
          echo "::error::Repository '${GITHUB_REPOSITORY#*/}' does not match any known environment prefix (infra-prd-*, infra-dev-*)."
          exit 1

      - name: Deploy to AWS CloudFormation
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ github.event.repository.name }}
          template: stack.yaml
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
