name: CloudFormation Deploy

on:
  workflow_call:
    inputs:
      cloudformation-filename:
        required: false
        type: string
        default: stack.yaml
      cloudformation-params-override:
        required: false
        type: string

jobs:
  cloudformation-deploy:
    name: Deploy to AWS CloudFormation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (production environment)
        if: ${{ success() && startsWith(github.event.repository.name, 'infra-prd-') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_VALUE }}
          aws-region: us-east-1

      - name: Configure AWS Credentials (staging/dev environments)
        if: ${{ success() && startsWith(github.event.repository.name, 'infra-stg-') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_VALUE }}
          aws-region: us-east-2

      - name: Configure AWS Credentials (sandbox environment)
        if: ${{ success() && startsWith(github.event.repository.name, 'infra-sbx-') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_CLOUDFORMATION_DEPLOY_KEY_VALUE }}
          aws-region: us-west-2

      - name: Deploy to AWS CloudFormation
        if: ${{ success() && (inputs.cloudformation-params-override == '')}}
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ github.event.repository.name }}
          template: ${{ inputs.cloudformation-filename }}
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM

      - name: Deploy to AWS CloudFormation (params-override)
        if: ${{ success() && !(inputs.cloudformation-params-override == '')}}
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ github.event.repository.name }}
          template: ${{ inputs.cloudformation-filename }}
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
          parameter-overrides: ${{ inputs.cloudformation-params-override }}
